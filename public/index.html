<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Brand logo as SVG favicon — scales perfectly across all browser sizes.
         PNG/ico fallbacks for browsers without SVG favicon support. ?v= busts cache. -->
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg?v=4" />
    <link rel="alternate icon" type="image/png" href="%PUBLIC_URL%/logo.png?v=4" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico?v=4" />
    <link rel="mask-icon" href="%PUBLIC_URL%/favicon.svg?v=4" color="#c2562a" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Primary SEO -->
    <title>Nanma Properties — Luxury Real Estate</title>
    <meta name="description" content="Nanma Properties offers curated luxury real estate — bespoke residences, investment properties, and exclusive estates crafted for the discerning few." />
    <meta name="keywords" content="luxury real estate, premium properties, exclusive estates, luxury homes, Nanma Properties, high-end real estate" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Nanma Properties" />
    <link rel="canonical" href="https://nanmaconstruct.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nanmaconstruct.com/" />
    <meta property="og:title" content="Nanma Properties — Luxury Real Estate" />
    <meta property="og:description" content="Curated luxury real estate for the discerning few. Discover bespoke residences and exclusive estates." />
    <meta property="og:image" content="https://nanmaconstruct.com/og-image.jpg" />
    <meta property="og:site_name" content="Nanma Properties" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nanma Properties — Luxury Real Estate" />
    <meta name="twitter:description" content="Curated luxury real estate for the discerning few." />
    <meta name="twitter:image" content="https://nanmaconstruct.com/og-image.jpg" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "RealEstateAgent",
      "name": "Nanma Properties",
      "description": "Curated luxury real estate for the discerning few.",
      "url": "https://nanmaconstruct.com",
      "telephone": "+1-800-NANMA-01",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "One Park Avenue",
        "addressLocality": "New York",
        "addressRegion": "NY",
        "postalCode": "10016",
        "addressCountry": "US"
      },
      "sameAs": [
        "https://instagram.com/nanmaconstruct",
        "https://linkedin.com/company/nanmaconstruct"
      ]
    }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png?v=3" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
